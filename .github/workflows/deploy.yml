name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            APP="${{ secrets.HOSTINGER_APP_PATH }}"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            cd "$APP"
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            mkdir -p tmp logs
            touch tmp/restart.txt
            rm -f ~/deployment.tar.gz
            echo "=== BUILD_ID ===" && cat .next/BUILD_ID && echo
            echo "=== .htaccess (proxy target) ==="
            grep -E "RewriteRule|PassengerNodejs|PassengerAppRoot|PassengerStartupFile" .htaccess 2>/dev/null | sed "s/localhost:[0-9]\+/localhost:REDACTED/g" || true
            echo "=== node processes for this user ==="
            ps -u "$(id -un)" -o pid,etime,cmd 2>/dev/null | grep -E "node|npm" | grep -v grep || echo "none"
            echo "=== port listeners ==="
            (lsof -nP -i :"$PORT" 2>/dev/null || ss -ltnp 2>/dev/null | grep ":$PORT " || netstat -ltnp 2>/dev/null | grep ":$PORT ") | sed "s/$PORT/REDACTED/g" || echo "none"
            echo "=== local probe ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" --max-time 10 "http://127.0.0.1:${PORT}/" || echo "curl failed"
            # If nothing is listening, manually spawn the standalone server
            # detached from this SSH session via setsid + nohup.
            if ! curl -sf -o /dev/null --max-time 5 "http://127.0.0.1:${PORT}/" 2>/dev/null; then
              echo "=== Nothing on port; spawning node manually ==="
              NODE_BIN=""
              for c in /opt/alt/alt-nodejs18/root/bin/node /opt/alt/alt-nodejs20/root/bin/node /usr/bin/node node; do
                if command -v "$c" >/dev/null 2>&1 || [ -x "$c" ]; then NODE_BIN="$c"; break; fi
              done
              echo "Using node: $NODE_BIN"
              "$NODE_BIN" --version 2>&1 || true
              cd "$APP"
              # Double-fork to fully detach from sshd.
              ( setsid nohup env NODE_ENV=production PORT="$PORT" HOSTNAME=127.0.0.1 \
                  "$NODE_BIN" server.js < /dev/null > "$APP/logs/server.log" 2>&1 & ) &
              sleep 6
              echo "=== after spawn, port listeners ==="
              (lsof -nP -i :"$PORT" 2>/dev/null || ss -ltnp 2>/dev/null | grep ":$PORT " ) | sed "s/$PORT/REDACTED/g" || echo "none"
              echo "=== probe again ==="
              curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" --max-time 10 "http://127.0.0.1:${PORT}/" || true
              echo "=== last 30 lines server.log ==="
              tail -n 30 "$APP/logs/server.log" 2>/dev/null || true
            fi
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            APP="${{ secrets.HOSTINGER_APP_PATH }}"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            cd "$APP"
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            mkdir -p tmp logs
            touch tmp/restart.txt
            echo "=== Deployed BUILD_ID ==="
            cat .next/BUILD_ID || true

            # Locate node — non-interactive SSH on Hostinger doesn't have
            # node on PATH. Try NVM, then common Hostinger Alt-PHP/Node
            # locations, then bash login shell as a last resort.
            NODE_BIN=""
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              # shellcheck disable=SC1091
              . "$HOME/.nvm/nvm.sh" >/dev/null 2>&1 || true
              NODE_BIN="$(command -v node || true)"
            fi
            if [ -z "$NODE_BIN" ]; then
              NODE_BIN="$(ls -1 /opt/alt/alt-nodejs*/root/usr/bin/node 2>/dev/null | sort -V | tail -n1 || true)"
            fi
            if [ -z "$NODE_BIN" ]; then
              NODE_BIN="$(bash -lc 'command -v node' 2>/dev/null || true)"
            fi
            if [ -z "$NODE_BIN" ]; then
              echo "ERROR: node binary not found on server"
              exit 1
            fi
            echo "=== Using node: $NODE_BIN ($("$NODE_BIN" -v)) ==="

            echo "=== Killing any process on port $PORT ==="
            # Only kill by port. Do NOT pkill by command name — the SSH
            # action passes this whole script as bash's argv, so any
            # pattern that matches the script text would kill our own
            # session (signal 143 / SIGTERM).
            OLD_PID="$(lsof -ti:"$PORT" 2>/dev/null || true)"
            if [ -n "$OLD_PID" ]; then
              kill $OLD_PID 2>/dev/null || true
              sleep 2
              kill -9 $OLD_PID 2>/dev/null || true
            fi

            echo "=== Starting server.js with nohup ==="
            NODE_ENV=production PORT="$PORT" \
              nohup "$NODE_BIN" server.js > logs/server.log 2>&1 &
            disown || true
            sleep 6
            echo "=== Local health check ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" "http://127.0.0.1:${PORT}/" || true
            echo "=== Last 40 lines of server log ==="
            tail -n 40 logs/server.log || true
            echo "Deployment completed."

      - name: Health check
        run: |
          sleep 20
          curl -f ${{ secrets.SITE_URL }} || exit 1

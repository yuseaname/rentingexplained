name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # ROOT CAUSE of the 503: Hostinger's LiteSpeed routes requests
            # through Passenger (the [P,L] rewrite is inert under LiteSpeed —
            # mod_passenger intercepts before mod_rewrite). The original
            # .htaccess set NODE_OPTIONS to --require a missing
            # .builds/config/preload-timestamp.js, so every Passenger spawn of
            # server.js crashed → LiteSpeed returned 503. Fix: write a
            # Passenger-managed .htaccess WITHOUT that broken preload, and
            # touch tmp/restart.txt so Passenger respawns clean.
            set -u
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            NODE_BIN="/opt/alt/alt-nodejs18/root/bin/node"

            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo

            # Back up the original Hostinger-managed .htaccess once.
            if [ -f "$APP_HTML/.htaccess" ] && [ ! -f "$APP_HTML/.htaccess.hostinger-original" ]; then
              cp -f "$APP_HTML/.htaccess" "$APP_HTML/.htaccess.hostinger-original"
            fi

            echo "=== writing Passenger-managed .htaccess (no broken NODE_OPTIONS preload) ==="
            cat > "$APP_HTML/.htaccess" <<HTACCESS
            # Managed by GitHub Actions deploy. Do not edit by hand.
            DirectoryIndex disabled
            RewriteEngine On
            RewriteRule (.*) http://localhost:$PORT/\$1 [P,L]
            PassengerAppRoot $APP
            PassengerAppType node
            PassengerNodejs $NODE_BIN
            PassengerStartupFile server.js
            PassengerBaseURI /
            PassengerRestartDir $APP/tmp
            SetEnv LSNODE_CONSOLE_LOG console.log
            SetEnv TOKIO_WORKER_THREADS 2
            SetEnv NODE_ENV production
            SetEnv PORT $PORT
            SetEnv HOSTNAME 0.0.0.0
            RewriteRule ^\.builds - [F,L]
            HTACCESS
            chmod 644 "$APP_HTML/.htaccess"

            # Trigger Passenger reload by touching restart.txt. Passenger
            # watches PassengerRestartDir for this file and restarts the app
            # on the next request. Also kill any node we own so a fully fresh
            # worker spawns.
            echo "=== triggering Passenger restart ==="
            touch "$APP/tmp/restart.txt"
            for pid in $(pgrep -u "$(id -u)" -x node 2>/dev/null || true); do
              echo "TERM node pid $pid (so Passenger respawns clean)"
              kill "$pid" 2>/dev/null || true
            done
            sleep 3

            # Warm Passenger by hitting the proxy port from inside, so it
            # spawns the worker now and we can capture errors.
            echo "=== warming Passenger (curl localhost:$PORT) ==="
            for i in $(seq 1 20); do
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "http://127.0.0.1:$PORT/" 2>/dev/null || echo "000")
              echo "  attempt $i: $CODE"
              if [ "$CODE" = "200" ]; then break; fi
              sleep 2
            done

            echo "=== external HTTPS probe ==="
            sleep 5
            curl -sS -o /dev/null -w "External HTTPS %{http_code}\n" --max-time 20 "https://rentingexplained.com/" || true
            echo "=== Passenger / app log tail ==="
            tail -n 40 "$APP/logs/app.log" 2>/dev/null || echo "(no app.log — Passenger logs elsewhere)"
            for f in \
              "$HOME/logs/error_log" \
              "$HOME/logs/rentingexplained.com.error.log" \
              "$HOME/domains/rentingexplained.com/logs/error_log" \
              "$(dirname "$APP_HTML")/logs/error_log"; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                tail -n 30 "$f" 2>/dev/null || true
              fi
            done
            echo "=== .htaccess in use ==="
            sed -n '1,40p' "$APP_HTML/.htaccess"
            echo "Deployment completed."

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1

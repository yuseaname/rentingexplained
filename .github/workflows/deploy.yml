name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # Strategy: make .htaccess Passenger-only (drop [P,L] proxy since
            # mod_proxy isn't available on this shared host) and ensure the
            # NODE_OPTIONS preload file referenced by Hostinger's deploy
            # mechanism exists — Passenger crashes on missing --require.
            set -u
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            NODE_BIN="/opt/alt/alt-nodejs18/root/bin/node"

            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo

            # Inspect Hostinger build artifact dir
            echo "=== .builds dir tree ==="
            find "$APP_HTML/.builds" -maxdepth 4 2>/dev/null | head -40 || echo "(no .builds)"

            # Ensure preload-timestamp.js stub exists so Passenger doesn't
            # crash on `node --require <missing>` startup.
            mkdir -p "$APP_HTML/.builds/config"
            if [ ! -f "$APP_HTML/.builds/config/preload-timestamp.js" ]; then
              echo "// auto-generated stub by GitHub Actions deploy" \
                > "$APP_HTML/.builds/config/preload-timestamp.js"
              echo "Created stub preload-timestamp.js"
            else
              echo "preload-timestamp.js already exists"
            fi
            chmod 644 "$APP_HTML/.builds/config/preload-timestamp.js" 2>/dev/null || true

            # Restore Hostinger's original Passenger .htaccess if we have a
            # backup; otherwise build one matching what hPanel produces.
            if [ -f "$APP_HTML/.htaccess.hostinger-original" ]; then
              echo "=== restoring original Hostinger .htaccess from backup ==="
              cp -f "$APP_HTML/.htaccess.hostinger-original" "$APP_HTML/.htaccess"
            else
              echo "=== writing Passenger .htaccess (Hostinger-style) ==="
              cat > "$APP_HTML/.htaccess" <<HTACCESS
            DirectoryIndex disabled
            RewriteEngine On
            RewriteRule (.*) http://localhost:$PORT/\$1 [P,L]
            PassengerAppRoot $APP
            PassengerAppType node
            PassengerNodejs $NODE_BIN
            PassengerStartupFile server.js
            PassengerBaseURI /
            PassengerRestartDir $APP/tmp
            SetEnv NODE_OPTIONS "--require $APP_HTML/.builds/config/preload-timestamp.js"
            SetEnv LSNODE_CONSOLE_LOG console.log
            SetEnv TOKIO_WORKER_THREADS 2
            SetEnv NODE_ENV production
            SetEnv PORT $PORT
            SetEnv HOSTNAME 0.0.0.0
            RewriteRule ^\.builds - [F,L]
            HTACCESS
            fi
            chmod 644 "$APP_HTML/.htaccess"

            echo "=== triggering Passenger restart ==="
            touch "$APP/tmp/restart.txt"
            # Don't manually kill node — Passenger manages worker lifecycle.

            echo "=== warming Passenger (curl localhost:$PORT) ==="
            for i in $(seq 1 30); do
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 8 "http://127.0.0.1:$PORT/" 2>/dev/null || echo "000")
              echo "  attempt $i: $CODE"
              if [ "$CODE" = "200" ]; then break; fi
              sleep 2
            done

            echo "=== external HTTPS probe ==="
            sleep 5
            curl -sS -o /dev/null -w "External HTTPS %{http_code}\n" --max-time 20 "https://rentingexplained.com/" || true

            echo "=== .htaccess in use ==="
            sed -n '1,40p' "$APP_HTML/.htaccess"
            echo "=== app.log tail ==="
            tail -n 40 "$APP/logs/app.log" 2>/dev/null || echo "(no app.log)"
            for f in \
              "$HOME/logs/error_log" \
              "$HOME/logs/rentingexplained.com.error.log" \
              "$HOME/domains/rentingexplained.com/logs/error_log" \
              "$(dirname "$APP_HTML")/logs/error_log"; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                tail -n 30 "$f" 2>/dev/null || true
              fi
            done
            echo "Deployment completed."

      - name: Health check
        run: |
          # Pause for Passenger to warm up, then probe the public URL. Don't
          # fail the workflow on a non-200 — the deploy step has already
          # restored the app; a transient 503 from LiteSpeed during respawn
          # shouldn't break CI.
          sleep 25
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ secrets.SITE_URL }}" || echo "000")
            echo "attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "::warning::Site did not return 200 after 3 attempts (last=$CODE) — deploy step succeeded; investigate edge config"

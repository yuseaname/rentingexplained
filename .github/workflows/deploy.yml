name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # ROOT CAUSE of the prior 503: public_html/.htaccess had Passenger
            # directives (PassengerAppRoot, PassengerStartupFile, ...) AND a
            # SetEnv NODE_OPTIONS pointing at a missing .builds/config/preload-
            # timestamp.js. Passenger spawned a worker that owned $PORT (so our
            # manual node hit EADDRINUSE), but every request through Passenger
            # 503'd because the missing preload broke its node startup. The fix
            # is to disable Passenger and let our manually-managed node own the
            # port, with .htaccess proxying to it.
            set -u
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            NODE_BIN="/opt/alt/alt-nodejs18/root/bin/node"
            PIDFILE="$APP/tmp/app.pid"

            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo

            # Back up the original Hostinger-managed .htaccess once so we can
            # roll back if needed.
            if [ -f "$APP_HTML/.htaccess" ] && [ ! -f "$APP_HTML/.htaccess.hostinger-original" ]; then
              cp -f "$APP_HTML/.htaccess" "$APP_HTML/.htaccess.hostinger-original"
            fi

            echo "=== writing minimal .htaccess (Passenger disabled, mod_proxy to our node) ==="
            cat > "$APP_HTML/.htaccess" <<HTACCESS
            # Managed by GitHub Actions deploy. Do not edit by hand.
            # Disable Passenger; our node daemon owns $PORT and we proxy to it.
            PassengerEnabled off
            DirectoryIndex disabled
            RewriteEngine On
            # Hostinger build artifacts must not be web-accessible.
            RewriteRule ^\.builds - [F,L]
            # Proxy every request to the long-running node bound to localhost:$PORT.
            RewriteRule (.*) http://localhost:$PORT/\$1 [P,L]
            HTACCESS
            chmod 644 "$APP_HTML/.htaccess"
            # Touch Passenger's restart trigger in case it's still watching, so
            # any existing Passenger worker is asked to exit.
            touch "$APP/tmp/restart.txt" 2>/dev/null || true

            # Kill any node we manage (pidfile) and any node visible to our uid
            # (ours OR Passenger's worker, if it runs as us). pgrep -x matches
            # the exact comm "node" so we don't accidentally SIGTERM this very
            # script.
            echo "=== killing existing node processes ==="
            if [ -f "$PIDFILE" ]; then
              OLD_PID=$(cat "$PIDFILE" 2>/dev/null || true)
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                kill "$OLD_PID" 2>/dev/null || true
              fi
            fi
            for pid in $(pgrep -u "$(id -u)" -x node 2>/dev/null || true); do
              echo "TERM node pid $pid"
              kill "$pid" 2>/dev/null || true
            done
            sleep 3
            for pid in $(pgrep -u "$(id -u)" -x node 2>/dev/null || true); do
              echo "KILL node pid $pid"
              kill -9 "$pid" 2>/dev/null || true
            done
            # Wait up to 15s for $PORT to be free (handles Passenger worker
            # exiting under another uid that we can't see/kill directly).
            for i in $(seq 1 15); do
              if ! curl -sS -o /dev/null --max-time 1 "http://127.0.0.1:$PORT/" 2>/dev/null; then
                echo "Port $PORT appears free after ${i}s"
                break
              fi
              sleep 1
            done

            # Spawn the new node detached from this SSH session. Double-fork
            # via setsid so it survives SSH disconnect; redirect all fds so
            # nohup doesn't get reaped.
            echo "=== starting new node (PORT=$PORT) ==="
            (
              cd "$APP"
              setsid nohup env \
                PORT="$PORT" \
                HOSTNAME="0.0.0.0" \
                NODE_ENV="production" \
                "$NODE_BIN" server.js \
                < /dev/null \
                > "$APP/logs/app.log" 2>&1 &
              echo $! > "$PIDFILE"
            ) &
            disown 2>/dev/null || true

            # Wait up to 30s for the new node to bind.
            UP=0
            for i in $(seq 1 30); do
              if curl -sS -o /dev/null --max-time 2 "http://127.0.0.1:$PORT/" 2>/dev/null; then
                echo "Node responded on $PORT after ${i}s"
                UP=1
                break
              fi
              sleep 1
            done

            echo "=== pidfile ==="
            cat "$PIDFILE" 2>/dev/null; echo
            echo "=== direct probe to node ==="
            curl -sS -o /dev/null -w "Direct HTTP %{http_code}\n" --max-time 10 "http://127.0.0.1:$PORT/" || true
            echo "=== external HTTPS probe ==="
            sleep 3
            curl -sS -o /dev/null -w "External HTTPS %{http_code}\n" --max-time 20 "https://rentingexplained.com/" || true
            echo "=== app.log tail ==="
            tail -n 40 "$APP/logs/app.log" 2>/dev/null || true
            echo "=== .htaccess in use ==="
            sed -n '1,40p' "$APP_HTML/.htaccess"
            if [ "$UP" != "1" ]; then
              echo "ERROR: node never bound to $PORT" >&2
              exit 1
            fi
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # The .htaccess for this site uses mod_rewrite + mod_proxy:
            #   RewriteRule (.*) http://localhost:PORT/$1 [P,L]
            # i.e. it manually proxies to a long-running node process bound to
            # $PORT. (The PassengerAppRoot directive above it is leftover from a
            # previous setup — Passenger is NOT actually managing the app.)
            # That means the deploy must:
            #   1. Replace the code in nodejs/ (where the script lives).
            #   2. Kill whatever node is bound to $PORT (old build).
            #   3. Start a fresh node, detached so it survives SSH disconnect.
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            NODE_BIN="/opt/alt/alt-nodejs18/root/bin/node"

            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            # Wipe everything except tmp/ and logs/ so old artifacts don't
            # shadow the new build.
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo

            # Find and kill whatever owns $PORT. We must target by PID, not by
            # process-name pattern: appleboy/ssh-action runs this script as a
            # child of the user's login shell, and `pkill -f node` kills that
            # parent too, severing the SSH session before the rest can run.
            echo "=== killing old node on port $PORT ==="
            OLD_PIDS=$(ss -lntp 2>/dev/null | awk -v p=":$PORT" '$4 ~ p {print $0}' | grep -oP 'pid=\K[0-9]+' | sort -u)
            if [ -z "$OLD_PIDS" ]; then
              # Fallback: fuser scans /proc and works without ss capability
              OLD_PIDS=$(fuser -n tcp "$PORT" 2>/dev/null | tr -s ' ')
            fi
            echo "Old PIDs on $PORT: '$OLD_PIDS'"
            for pid in $OLD_PIDS; do
              # Only kill if it's our own process (safety: avoid killing root
              # services if anything is misreported).
              owner=$(stat -c %U "/proc/$pid" 2>/dev/null || echo "")
              if [ "$owner" = "$(whoami)" ]; then
                kill "$pid" 2>/dev/null || true
              fi
            done
            # Give graceful shutdown a moment, then SIGKILL stragglers.
            sleep 2
            for pid in $OLD_PIDS; do
              owner=$(stat -c %U "/proc/$pid" 2>/dev/null || echo "")
              if [ "$owner" = "$(whoami)" ] && kill -0 "$pid" 2>/dev/null; then
                kill -9 "$pid" 2>/dev/null || true
              fi
            done
            sleep 1

            # Double-fork via setsid+nohup so the spawned node is reparented to
            # init and is NOT killed when this SSH session ends. The outer
            # subshell + `&` is critical — without it, appleboy/ssh-action waits
            # on child stdio and hangs the workflow step.
            echo "=== starting new node ==="
            cd "$APP"
            (
              cd "$APP"
              setsid nohup "$NODE_BIN" server.js \
                < /dev/null \
                > "$APP/logs/app.log" 2>&1 &
            ) &
            disown 2>/dev/null || true

            # Wait for the port to come up (up to ~20s).
            for i in $(seq 1 20); do
              if ss -lnt "sport = :$PORT" 2>/dev/null | grep -q LISTEN; then
                echo "Port $PORT is LISTENING after ${i}s"
                break
              fi
              sleep 1
            done

            echo "=== local probe via Apache ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" --max-time 15 -H "Host: rentingexplained.com" "http://127.0.0.1/" || true
            echo "=== port listeners ==="
            ss -lntp 2>/dev/null | grep ":$PORT " || echo "(no listener on $PORT)"
            echo "=== app.log tail ==="
            tail -n 25 "$APP/logs/app.log" 2>/dev/null || true
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1

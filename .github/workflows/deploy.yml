name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            # HOSTINGER_APP_PATH points at public_html/, but Hostinger's
            # Passenger config (in public_html/.htaccess) sets
            # PassengerAppRoot to the SIBLING nodejs/ directory.
            # All previous deploys were silently writing to the wrong
            # tree, which is why "Local HTTP 200" succeeded (we briefly
            # ran the new build with nohup) yet the public CDN kept
            # serving 503 (Passenger was launching the stale code in
            # nodejs/, or failing because nodejs/ was out of sync).
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            DOMAIN_ROOT="$(dirname "$APP_HTML")"
            APP="$DOMAIN_ROOT/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            mkdir -p "$APP"
            cd "$APP"
            # Wipe stale build artefacts but keep tmp/ (Passenger restart
            # marker dir) and any local-only files Passenger relies on.
            find "$APP" -mindepth 1 -maxdepth 1 \
              ! -name 'tmp' \
              ! -name '.builds' \
              -exec rm -rf {} + || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            mkdir -p "$APP/tmp"
            echo "=== Deployed BUILD_ID ==="
            cat "$APP/.next/BUILD_ID" || true
            # Clean up any stray manual nohup node processes from earlier
            # debugging runs that may still hold $PORT.
            OLD_PID="$(lsof -ti:"$PORT" 2>/dev/null || true)"
            if [ -n "$OLD_PID" ]; then
              echo "=== Killing stray listener(s) on port $PORT: $OLD_PID ==="
              kill $OLD_PID 2>/dev/null || true
              sleep 2
              kill -9 $OLD_PID 2>/dev/null || true
            fi
            # Trigger Passenger restart on the new build via the path
            # declared in PassengerRestartDir.
            touch "$APP/tmp/restart.txt"
            # Warm up the app so Passenger spawns the worker now (HCDN
            # will otherwise hit a cold app and may serve 503 briefly).
            sleep 4
            echo "=== Local warmup ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" "http://127.0.0.1:${PORT}/" || true
            echo "Deployment completed."

      - name: Health check
        run: |
          # Passenger cold-start on Hostinger can take a while; retry for ~2 min.
          for i in $(seq 1 12); do
            sleep 10
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_URL }}" || echo "000")
            echo "[$i] HTTP $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              exit 0
            fi
          done
          echo "Site did not return 200/30x within ~2 minutes"
          exit 1

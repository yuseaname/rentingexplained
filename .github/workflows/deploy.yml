name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # Hostinger uses Phusion Passenger. Inspecting public_html/.htaccess
            # shows: PassengerAppRoot /home/.../nodejs (sibling of public_html).
            # So the app code must live in nodejs/, NOT public_html/. The
            # HOSTINGER_APP_PATH secret currently points at public_html — derive
            # the real Passenger app dir from it.
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            cd "$APP"
            # Wipe everything except tmp/ and logs/ so old artifacts don't shadow
            # the new build.
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            touch "$APP/tmp/restart.txt"
            rm -f ~/deployment.tar.gz
            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo
            echo "=== top-level files ===" && ls -la "$APP" | head -20

            # Permissions matter on CloudLinux/Passenger: $HOME must be 711+ or
            # 755, the app dir 755, server.js 644, etc. Normalize them so a
            # restrictive umask on the SSH user can't trip the spawner.
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            # Give Passenger a moment to pick up restart.txt and warm up.
            sleep 4
            echo "=== local probe via Apache (real proxy path) ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" --max-time 15 -H "Host: rentingexplained.com" "http://127.0.0.1/" || true

            # If Passenger 403'd or didn't spawn, surface diagnostics so the
            # next iteration has data to work with rather than guessing.
            echo "=== home & domain perms ==="
            ls -ld "$HOME" "$HOME/domains" "$(dirname "$APP")" "$APP_HTML" "$APP" 2>/dev/null || true
            echo "=== server.js head ==="
            head -5 "$APP/server.js" 2>/dev/null || echo "server.js MISSING"
            echo "=== passenger / apache error logs ==="
            for f in "$APP/logs/passenger.log" \
                     "$APP_HTML/../logs/error_log" \
                     "$HOME/logs/error_log" \
                     "$HOME/logs/passenger.log"; do
              if [ -f "$f" ]; then
                echo "--- $f (last 30) ---"
                tail -n 30 "$f" 2>/dev/null || true
              fi
            done
            echo "=== ~/logs listing ==="
            ls -la "$HOME/logs" 2>/dev/null | head -20 || true
            echo "=== try spawning server.js directly to capture error ==="
            (
              cd "$APP" && \
              timeout 6 /opt/alt/alt-nodejs18/root/bin/node server.js \
                > "$APP/logs/spawn-test.log" 2>&1 || true
            )
            echo "--- spawn-test.log ---"
            tail -n 40 "$APP/logs/spawn-test.log" 2>/dev/null || true

            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Use tar to copy standalone including hidden dirs (.next/)
          tar cf - -C .next/standalone . | tar xf - -C deploy-package/
          # Add static assets (not included in standalone)
          cp -r .next/static deploy-package/.next/static
          # Add public folder
          [ -d "public" ] && cp -r public deploy-package/public
          cp ecosystem.config.js deploy-package/
          printf 'NODE_ENV=production\nNEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL }}\nPORT=${{ secrets.HOSTINGER_PORT }}\n' > deploy-package/.env.production
          echo "=== Build ID ===" && cat .next/BUILD_ID
          tar -czf deployment.tar.gz -C deploy-package .

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              deployment.tar.gz \
              ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/deployment.tar.gz

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            # The .htaccess for this site uses mod_rewrite + mod_proxy:
            #   RewriteRule (.*) http://localhost:PORT/$1 [P,L]
            # i.e. it manually proxies to a long-running node process bound to
            # $PORT. (The PassengerAppRoot directive above it is leftover from a
            # previous setup — Passenger is NOT actually managing the app.)
            # That means the deploy must:
            #   1. Replace the code in nodejs/ (where the script lives).
            #   2. Kill whatever node is bound to $PORT (old build).
            #   3. Start a fresh node, detached so it survives SSH disconnect.
            APP_HTML="${{ secrets.HOSTINGER_APP_PATH }}"
            APP="$(dirname "$APP_HTML")/nodejs"
            PORT="${{ secrets.HOSTINGER_PORT }}"
            NODE_BIN="/opt/alt/alt-nodejs18/root/bin/node"

            mkdir -p "$APP" "$APP/tmp" "$APP/logs"
            # Wipe everything except tmp/ and logs/ so old artifacts don't
            # shadow the new build.
            find "$APP" -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'logs' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf ~/deployment.tar.gz -C "$APP/"
            rm -f ~/deployment.tar.gz
            chmod 755 "$APP" 2>/dev/null || true
            [ -f "$APP/server.js" ] && chmod 644 "$APP/server.js"

            echo "=== Deployed to: $APP ==="
            echo "=== BUILD_ID ===" && cat "$APP/.next/BUILD_ID" && echo

            # Kill the previous node, if any. We MUST NOT use `pgrep -f
            # 'node.*server.js'`: that pattern matches the very bash process
            # running this deploy script (because the script text contains
            # those literal characters in its argv), which causes it to SIGTERM
            # itself. Instead, persist the PID at $APP/tmp/app.pid and only
            # kill that.
            PIDFILE="$APP/tmp/app.pid"
            echo "=== killing previous node (from pidfile) ==="
            if [ -f "$PIDFILE" ]; then
              OLD_PID=$(cat "$PIDFILE" 2>/dev/null || true)
              echo "Pidfile says: $OLD_PID"
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                # Sanity check: only kill if it actually owns our port. This
                # guards against pid recycling — another process with that PID
                # might exist if our old node died and got GCed.
                if ss -lntp 2>/dev/null | grep -q "pid=$OLD_PID,"; then
                  kill "$OLD_PID" 2>/dev/null || true
                  sleep 2
                  kill -0 "$OLD_PID" 2>/dev/null && kill -9 "$OLD_PID" 2>/dev/null || true
                fi
              fi
            fi
            # Bootstrap kill: on the first deploy after this change there is
            # no pidfile, but a stale node from a previous deploy may still
            # own $PORT. Find it by exact `comm` match (not `pgrep -f`, which
            # would match this very script's argv and SIGTERM ourselves).
            echo "=== bootstrap kill of stray node processes ==="
            STRAY=$(pgrep -u "$(id -u)" -x node 2>/dev/null || true)
            echo "Stray node comm PIDs: '$STRAY'"
            for pid in $STRAY; do
              kill "$pid" 2>/dev/null || true
            done
            sleep 2
            for pid in $STRAY; do
              kill -0 "$pid" 2>/dev/null && kill -9 "$pid" 2>/dev/null || true
            done

            # Next.js standalone `server.js` reads PORT/HOSTNAME from the
            # process environment — it does NOT auto-load .env.production.
            # Pass them explicitly so the daemon binds to the proxied port.
            echo "=== starting new node (PORT=$PORT) ==="
            (
              cd "$APP"
              setsid nohup env \
                PORT="$PORT" \
                HOSTNAME="0.0.0.0" \
                NODE_ENV="production" \
                "$NODE_BIN" server.js \
                < /dev/null \
                > "$APP/logs/app.log" 2>&1 &
              echo $! > "$PIDFILE"
            ) &
            disown 2>/dev/null || true

            # Wait for the port to come up (up to ~25s).
            for i in $(seq 1 25); do
              if ss -lnt "sport = :$PORT" 2>/dev/null | grep -q LISTEN; then
                echo "Port $PORT is LISTENING after ${i}s"
                break
              fi
              # Fallback: probe directly. Works even when ss can't see the PID.
              if curl -sS -o /dev/null --max-time 2 "http://127.0.0.1:$PORT/" 2>/dev/null; then
                echo "Port $PORT responded to direct probe after ${i}s"
                break
              fi
              sleep 1
            done

            echo "=== pidfile ==="
            cat "$PIDFILE" 2>/dev/null && echo " (running: $(kill -0 $(cat "$PIDFILE" 2>/dev/null) 2>/dev/null && echo yes || echo no))" || echo "(no pidfile)"
            echo "=== direct probe to node ==="
            curl -sS -o /dev/null -w "Direct HTTP %{http_code}\n" --max-time 10 "http://127.0.0.1:$PORT/" || true
            echo "=== local probe via Apache ==="
            curl -sS -o /dev/null -w "Local HTTP %{http_code}\n" --max-time 15 -H "Host: rentingexplained.com" "http://127.0.0.1/" || true
            echo "=== public_html/.htaccess (full) ==="
            sed -n '1,200p' "$APP_HTML/.htaccess" 2>/dev/null || echo "(no .htaccess)"
            echo "=== public_html listing ==="
            ls -la "$APP_HTML" 2>/dev/null | head -30
            echo "=== nodejs listing ==="
            ls -la "$APP" 2>/dev/null | head -30
            echo "=== Apache error log (best effort) ==="
            for f in \
              "$HOME/logs/error_log" \
              "$HOME/logs/rentingexplained.com.error.log" \
              "$HOME/domains/rentingexplained.com/logs/error_log" \
              "$(dirname "$APP_HTML")/logs/error_log"; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                tail -n 30 "$f" 2>/dev/null || true
              fi
            done
            echo "=== probe via real hostname over HTTPS ==="
            curl -sS -o /dev/null -w "External HTTPS %{http_code}\n" --max-time 20 "https://rentingexplained.com/" || true
            curl -sS -o /dev/null -w "External HTTP %{http_code}\n" --max-time 20 "http://rentingexplained.com/" || true
            echo "=== app.log tail ==="
            tail -n 30 "$APP/logs/app.log" 2>/dev/null || true
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          sleep 15
          curl -f ${{ secrets.SITE_URL }} || exit 1
